## Register and Formality {#register-and-formality}

**Casual**

- <ruby>あっという間<rt>ま</rt></ruby>に<ruby>休<rt>やす</rt></ruby>み<ruby>終<rt>お</rt></ruby>わっちゃったね。

*"Break went by so fast, huh."*

- いつの<ruby>間<rt>ま</rt></ruby>にか<ruby>雨<rt>あめ</rt></ruby><ruby>降<rt>ふ</rt></ruby>ってた。

*"Somehow it started raining without me noticing."*

Both expressions are fully natural in casual conversation. <ruby>何時<rt>いつ</rt></ruby>の<ruby>間<rt>ま</rt></ruby>にか commonly contracts to いつの<ruby>間<rt>ま</rt></ruby>にか in casual speech — this is not a grammatical contraction but a fixed colloquial variant. Both forms are equally casual; いつの<ruby>間<rt>ま</rt></ruby>にか is slightly faster in speech.

**Polite**

- <ruby>あっという間<rt>ま</rt></ruby>に<ruby>一週間<rt>いっしゅうかん</rt></ruby>が<ruby>過<rt>す</rt></ruby>ぎました。

*"A week passed in the blink of an eye."*

- <ruby>何時<rt>いつ</rt></ruby>の<ruby>間<rt>ま</rt></ruby>にか<ruby>外<rt>そと</rt></ruby>が<ruby>暗<rt>くら</rt></ruby>くなっていました。

*"Before I realized it, it had gotten dark outside."*

Both expressions accept です・ます without any structural adjustment. The emotional content is unchanged — politeness here is purely grammatical, not pragmatic.

**Written / Formal**

- <ruby>瞬<rt>またた</rt></ruby>く<ruby>間<rt>ま</rt></ruby>に<ruby>時<rt>とき</rt></ruby>が<ruby>過<rt>す</rt></ruby>ぎ去った。

*"Time flew past in the blink of an eye."*

- <ruby>気<rt>き</rt></ruby>がつけば、<ruby>季節<rt>きせつ</rt></ruby>はすっかり<ruby>移<rt>うつ</rt></ruby>ろっていた。

*"Before I knew it, the season had completely changed."*

In formal writing, <ruby>あっという間<rt>ま</rt></ruby>に is frequently replaced by <ruby>瞬<rt>またた</rt></ruby>く<ruby>間<rt>ま</rt></ruby>に. <ruby>何時<rt>いつ</rt></ruby>の<ruby>間<rt>ま</rt></ruby>にか is often replaced by <ruby>気<rt>き</rt></ruby>がつけば or いつの<ruby>間<rt>ま</rt></ruby>にか in narrative prose. These are stylistic choices, not register requirements — both original expressions can appear in formal writing without sounding wrong.

