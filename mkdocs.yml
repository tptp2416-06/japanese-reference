site_name: 日本語 Reference
site_description: Personal Japanese language reference — Tokyo casual, N3 level
site_author: Tim
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Nunito
    code: JetBrains Mono

  features:
    - navigation.tabs           # Top-level tabs (Grammar / Patterns / Dialogues)
    - navigation.tabs.sticky    # Tabs stay visible when scrolling
    - navigation.expand         # Auto-expand active section
    - navigation.top            # Back-to-top button
    - navigation.indexes        # Section index pages
    - search.highlight          # Highlight search terms on page
    - search.suggest            # Search autocomplete
    - search.share              # Shareable search links
    - content.tooltips          # Hover tooltips
    - toc.follow                # TOC highlights as you scroll

extra_css:
  - assets/css/custom.css
  - assets/css/japanese-reference.css

extra_javascript:
  - assets/js/custom.js

plugins:
  - search:
      lang:
        - en
        - ja
  - tags
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true
  - awesome-pages
  - section-index

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      title: On this page

nav:
  - Home: index.md
  - Grammar:
    - Overview: grammar/index.md
    - Verbs:
      - Overview: grammar/verbs/index.md
      - Causative Form (〜せる / 〜させる): grammar/verbs/causative-form.md
      - Transitive vs. Intransitive Verbs: grammar/verbs/trans-intrans-kimi.md
    - Particles:
      - Overview: grammar/particles/index.md
      - で — Location, Means, Scope, and Limit: grammar/particles/de-particle.md
      - も — Additive, Emphatic, Scalar, and Universal: grammar/particles/mo-particle.md
    - Expressions:
      - Overview: grammar/expressions/index.md

      # ── N4 ──────────────────────────────
      - N4:
        # Foundations
        - Te-form: grammar/expressions/te-form.md
        - Tense & Aspect: grammar/expressions/tense-aspect.md
        - Conditionals: grammar/expressions/conditionals.md

        # Explanatory & Quotation
        - 〜んだ — Explanatory / Realization Emphasis: grammar/expressions/n-da-kimi.md
        - 〜って — Casual Topic Marker / Quotative: grammar/expressions/tte-casual.md
        - なって・Internal Quotation: grammar/expressions/natte-internalquote.md
        - Embedded Questions — 〜か & 〜かどうか: grammar/expressions/questions-in-sentences-kimi.md

        # Contrast & Expectations
        - のに・Frustrated Expectations: grammar/expressions/noni-expectation.md
        - のに・Disappointed Contrast: grammar/expressions/noni-disappointed-kimi.md

        # Modality & Obligation
        - 〜なきゃ・ないと etc. — Must / Have To: grammar/expressions/obligation-kimi.md
        - ～ちゃいなよ — Casual Encouragement: grammar/expressions/chai-nayo-deepseek.md

        # Softening & Register
        - Casual Topic-Setting / Softening Pivot: grammar/expressions/topic-pivot-casual.md
        - Topic Markers Comparison: grammar/expressions/topic-markers-comp.md
        - Extra Modest Expressions: grammar/expressions/modest-expressions-kimi.md
        - かな — Self-Directed Musing / Soft Questions: grammar/expressions/ka-na-kimi.md

        # Aspect & State
        - 〜ていけばいい — Reassurance of Ongoing Action: grammar/expressions/te-ikebaiikara.md
        - あっという間に vs. いつの間にか — Speed vs. Change: grammar/expressions/speed-vs-change-deepseek.md
        - 〜っぱなし — Leaving Something in an Ongoing State: grammar/expressions/ppa-na-shi-kimi.md
        - 〜っちゃおっか — Casual Volitional + Completion: grammar/expressions/chau-okka-kimi.md

        # Reference & Scope
        - 〜のこと — The Person Themselves: grammar/expressions/no-koto-kimi.md
        - Explicit Pronouns and Names — When to Say 私, あなた, and 彼: grammar/expressions/explicit-pronouns-names.md

      # ── N3 ──────────────────────────────
      - N3:
        # State & Change
        - 〜てある — Completed Action with Ongoing Intent: grammar/expressions/te-aru.md
        - 〜ように・〜ようになる — Change of State: grammar/expressions/youni-youninaru-kimi.md
        - 〜みたい — Seems Like / Apparently: grammar/expressions/mitai-kimi.md

    - 〜ている Related:
      - Overview: grammar/te-iru-related/index.md
      - 〜ている — Resultative Change: grammar/te-iru-related/result-change.md
      - なる + ている — Resultative State of Becoming: grammar/te-iru-related/naru-te-iru.md
      - 〜ていてくれる — Sustained Action for My Benefit: grammar/te-iru-related/sustained-action-kimi.md

    - Test:
      - Overview: grammar/test/index.md
      # AI comparison versions
      - 〜んだ — DeepSeek: grammar/expressions/n-da-deepseek.md
      - 〜んだ — Kimi (Ruby): grammar/expressions/n-da-kimi-ruby.md
      - 〜っぱなし — DeepSeek: grammar/expressions/ppa-na-shi-deepseek.md
      - 〜って — ChatGPT: grammar/expressions/tte-casual-gpt.md
      - Embedded Questions — Claude: grammar/expressions/questions-in-sentences.md
      - Embedded Questions — DeepSeek: grammar/expressions/questions-in-sentences-deepseek.md
      - Extra Modest Expressions — Claude: grammar/expressions/modest-expressions.md
      - Extra Modest Expressions — DeepSeek: grammar/expressions/modest-expressions-deepseek.md
      # Format tests
      - ChatGPT Test 1: grammar/test/chatgpt-test1.md
      - Claude Test 1 — HTML MD Hybrid: grammar/test/claude-test1.md
      - Gemini Test 1: grammar/test/gemini-test1.md
      - DeepSeek Test 1: grammar/test/deepseek-test1.md
      - Perplexity Test 1: grammar/test/perplexity-test1.md
      - Test One: grammar/test/test1.md
      - Claude MD Version: grammar/test/claude-test2-mdversion.md

  - Vocabulary:
    - Overview: vocabulary/index.md
    - 甘える — Depending on Others' Kindness: vocabulary/amaeru.md
    - 大切 vs. 大事 — Important: vocabulary/taisetsu-daiji.md
    - 遅れる vs. 遅くなる vs. 遅刻する vs. 遅延する — Lateness & Delay: vocabulary/lateness-delay.md
  - Patterns:
    - Overview: patterns/index.md
    - Softeners & Hedges: patterns/softeners.md
    - Seeking Connection: patterns/seeking-connection.md
    - Emotional Register: patterns/emotional-register.md
  - Dialogues:
    - Overview: dialogues/index.md
    - dialogues/test.md
    - Sample Dialogue: dialogues/sample-dialogue.md
    - Suddenly Started Running: dialogues/suddenrunning.md
  - Questions:
    - Overview: questions/index.md
    - Noun Modifying Clauses: questions/noun-modify-clause.md
    - Word Order: questions/word-order.md    
  - Tags: tags.md

extra:
  tags:
    N3: n3
