site_name: 日本語 Reference
site_description: Personal Japanese language reference — Tokyo casual, N3 level
site_author: Tim
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Nunito
    code: JetBrains Mono

  features:
    - navigation.tabs           # Top-level tabs (Grammar / Patterns / Dialogues)
    - navigation.tabs.sticky    # Tabs stay visible when scrolling
    - navigation.sections       # Collapsible sidebar sections
    - navigation.expand         # Auto-expand active section
    - navigation.top            # Back-to-top button
    - navigation.indexes        # Section index pages
    - search.highlight          # Highlight search terms on page
    - search.suggest            # Search autocomplete
    - search.share              # Shareable search links
    - content.tooltips          # Hover tooltips
    - toc.follow                # TOC highlights as you scroll

extra_css:
  - assets/css/custom.css
  - assets/css/japanese-reference.css

extra_javascript:
  - assets/js/custom.js

plugins:
  - search:
      lang:
        - en
        - ja
  - tags
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true
  - awesome-pages
  - section-index

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      title: On this page

nav:
  - Home: index.md
  - Grammar:
    - grammar/index.md
    - Te-form: grammar/te-form.md
    - Tense & Aspect: grammar/tense-aspect.md
    - Conditionals: grammar/conditionals.md
    - のに・Frustrated Expectations: grammar/noni-expectation.md
    - なって・Internal Quotation: grammar/natte-internalquote.md
    - 〜ていけばいい・Reassurance of Sufficient Ongoing Action: grammar/te-ikebaiikara.md
    - Extra Modest Expressions: grammar/modest-expressions.md
    - 〜か・Embedded Questions: grammar/questions-in-sentences.md
    - ChatGpt Test 1: grammar/chatgpt-test1.md
    - Claude Test 1 - HTML MD Hybrid: grammar/claude-test1.md
    - Gemini Test 1: grammar/gemini-test1.md
    - DeepSeek Test 1: grammar/deepseek-test1.md
    - Test One: grammar/test1.md
    - Claude MD Version: grammar/claude-test2-mdversion.md
  - Patterns:
    - patterns/index.md
    - Softeners & Hedges: patterns/softeners.md
    - Seeking Connection: patterns/seeking-connection.md
    - Emotional Register: patterns/emotional-register.md
  - Dialogues:
    - dialogues/index.md
    - dialogues/test.md
    - Sample Dialogue: dialogues/sample-dialogue.md
    - Suddenly Started Running: dialogues/suddenrunning.md
  - Tags: tags.md

extra:
  tags:
    N3: n3
    Casual: casual
    Polite: polite
    Romantic: romantic
    Pragmatics: pragmatics
