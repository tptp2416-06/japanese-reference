name: Deploy MkDocs to GitHub Pages
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material mkdocs-glightbox mkdocs-minify-plugin mkdocs-section-index mkdocs-awesome-pages-plugin mkdocs-git-revision-date-localized-plugin==1.5.1
      - run: mkdocs gh-deploy --force
